<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>

    <style>
        *{
            padding: 0;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        :root{
            --cor-primaria: #000000;
            --cor-secundaria: #800080;
            --cor-tercearia: #ffffff;
            
        }
        body{
            background-color: var(--cor-primaria);
        }
        main{
            display: flex;
            flex-flow: column nowrap;
            place-content: center center;
            place-items: center center;
            padding-top: 20px;
        }
        main h1{
            color: var(--cor-secundaria);
            font-size: 3em;
            padding: 40px;

        }
        form{
            display: flex;
            flex-flow: column nowrap;
            width: 50vw;
        }
        form p{
            display: flex;
            flex-flow: column;
            place-content: center center;
            place-items: center center;
            font-size: 1.5em;
        }
        label{
            padding: 15px;
            color: var(--cor-secundaria);
            font-weight: bold;
        }
        input{
            height: 60px;
            width: 400px;
            padding: 10px;
            background-color: rgb(255, 255, 255);
            color: var(--cor-Quaternária);
            border: none;
            border-radius: 10px;
            font-size: 1em;


        }
        #imessage{
            width: 400px;
            height: 500px;
            padding: 20px;
            resize: none;
            font-size: 1em;
            text-align: justify;
            color: var(--cor-primaria);
            border-radius: 10px;
            
        }
        button{
            margin: 20px;
            width: 150px;
            height: 50px;
            color: var(--cor-secundaria);
            font-weight: bold;
            font-size: 1.2em;
            background-color: #ffffff;
            border-radius: 10px;
            transition: 0.2s;
        }
        button:hover{
            background-color: var(--cor-secundaria);
            color: var(--cor-primaria);
        }
        



        
    </style>
</head>
<body>
    <main>
        <h1>Contate-me</h1>
        <form action="https://formsubmit.co/ricardorsq696@gmail.com" method="POST">
           <input type="hidden" name="_next" value="https://ryan-silva-dev.github.io/Portf-lio/obrigado.html">
            <p> 
                <label for="iname">Nome:</label>
                <input type="text" required name="name" class="form-control" required placeholder="Digite seu nome" id="iname">
            </p>
            <p> 
                <label for="iemail">E-mail:</label>
                <input type="email"  name="email" class="form-control" required placeholder="Digite seu E-mail" id="iemail">
            </p>
            <p> 
                <label for="imessage">Mensagem:</label>
                <textarea name="message" class="form-control" placeholder="Motivo do contato" rows="15" id="imessage"></textarea>
            </p>
            <p>
                <button type="submit"> Enviar </button>
            </p>
        </form>
    </main>
</body>
</html>
