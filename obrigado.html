<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado</title>
    <style>
        body{
            background-color: black;
            display: grid
        }
        h1{
            text-align: center;
            color: purple;
            padding: 50px;
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            background-color: purple;
            color: black;
            border: 1px solid black;
            text-decoration: none;
            margin: auto;
            text-align: center;
            place-content: center center;
            border-radius: 10px;
            font-weight: bold;
            font-family: Arial, Helvetica, sans-serif;
            width: 200px;
            height: 80px;
            transition: 0.7s;
        }
        a:hover{
            background-color: black;
            color: purple;
            border:1px solid purple;
        }
    </style>
</head>
<body>
    <h1>Obrigado pelo contato. Recebi suas informações e retornarei o mais breve possível no e-mail informado.</h1>
    <a href="https://github.com/Ryan-Silva-Dev/Portf-lio/index.html">Voltar</a>

</html>
